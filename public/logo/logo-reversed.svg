<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 130" role="img" aria-label="NHN&D Tax Advisory">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');
      .wordmark { font-family: 'Playfair Display', 'Times New Roman', serif; font-weight: 700; letter-spacing: -0.02em; }
      .tagline  { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.04em; }
      .cream { fill: #FAF7F0; }
      .gold { fill: #C9A961; }
      .gold-stroke { stroke: #C9A961; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <!-- Navy background -->
  <rect width="380" height="130" fill="#0F2B46" />

  <!-- Checkmark accent gold -->
  <path d="M 168 28 L 178 38 L 196 18" class="gold-stroke" stroke-width="2.6" transform="translate(0, 0)" />

  <!-- Wordmark NHN (cream, top) -->
  <text x="18" y="70" class="wordmark cream" font-size="60">NHN</text>

  <!-- Wordmark &D (gold, bottom — accent preserved) -->
  <text x="18" y="124" class="wordmark gold" font-size="60">&amp;D</text>

  <!-- Vertical divider gold -->
  <line x1="190" y1="34" x2="190" y2="120" stroke="#C9A961" stroke-width="1.5" />

  <!-- Tagline cream -->
  <text x="208" y="72" class="tagline cream" font-size="22">Tax</text>
  <text x="208" y="104" class="tagline cream" font-size="22">Advisory</text>
</svg>
