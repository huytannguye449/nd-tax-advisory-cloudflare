<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" role="img" aria-label="NHN&D Tax Advisory">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;family=Inter:wght@500;700&amp;display=swap');
      .wm { font-family: 'Playfair Display', 'Times New Roman', serif; font-weight: 700; letter-spacing: -0.02em; }
      .tg { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
      .navy { fill: #0F2B46; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="600" height="240" fill="#FAF7F0"/>

  <!-- All navy — same layout as primary -->
  <text x="40" y="105" class="wm navy" font-size="95">NHN</text>
  <text x="40" y="195" class="wm navy" font-size="95">&amp;D</text>

  <!-- Vertical navy divider -->
  <line x1="280" y1="45" x2="280" y2="195" stroke="#0F2B46" stroke-width="4"/>

  <!-- Tax / Advisory (Inter bold, navy) -->
  <text x="310" y="115" class="tg navy" font-size="48">Tax</text>
  <text x="310" y="175" class="tg navy" font-size="48">Advisory</text>
</svg>
