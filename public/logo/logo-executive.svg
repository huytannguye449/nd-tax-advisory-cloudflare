<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Brand Cream -->
  <rect width="800" height="400" fill="#FAF7F0" />
  
  <!-- Logo Group: Centered for Premium Presentation -->
  <g transform="translate(400, 200)">
    
    <!-- Primary Wordmark: NHN & D -->
    <!-- Using Playfair Display as proxy for the brand's serif -->
    <text text-anchor="end" x="-15" y="20" font-family="Playfair Display, serif" font-weight="700" font-size="120" fill="#0F2B46" letter-spacing="-2">NHN</text>
    
    <!-- The ampersand: Muted Gold, Italic, Elegant -->
    <text text-anchor="middle" x="50" y="20" font-family="Playfair Display, serif" font-style="italic" font-weight="400" font-size="130" fill="#C9A961">&amp;</text>
    
    <!-- The D: Deep Navy -->
    <text text-anchor="start" x="115" y="20" font-family="Playfair Display, serif" font-weight="700" font-size="120" fill="#0F2B46">D</text>
    
    <!-- Tagline: TAX ADVISORY - Clean, High-Spaced Sans-Serif -->
    <text text-anchor="middle" x="50" y="90" font-family="Inter, sans-serif" font-weight="500" font-size="24" fill="#0F2B46" letter-spacing="18">TAX ADVISORY</text>
    
  </g>
</svg>