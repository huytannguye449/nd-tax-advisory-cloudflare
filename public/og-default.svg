<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;family=Inter:wght@500;700&amp;display=swap');
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="#FAF7F0"/>

  <!-- Stitch corporate wordmark — centered at top, scaled from 600x240 spec -->
  <!-- NHN stacked (Playfair bold, navy) -->
  <text x="360" y="185" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="95" fill="#0F2B46">NHN</text>
  <!-- &D stacked (Playfair bold, gold) -->
  <text x="360" y="280" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="95" fill="#C9A961">&amp;D</text>
  <!-- Vertical gold divider -->
  <line x1="590" y1="110" x2="590" y2="290" stroke="#C9A961" stroke-width="4"/>
  <!-- Tax / Advisory (Inter bold, charcoal) -->
  <text x="620" y="200" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" fill="#1A1A1A">Tax</text>
  <text x="620" y="260" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" fill="#1A1A1A">Advisory</text>

  <!-- Vietnamese tagline — Playfair Display -->
  <text x="600" y="390" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="44" fill="#0F2B46">Giúp chủ doanh nghiệp an tâm</text>
  <text x="600" y="445" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="44" fill="#0F2B46">với mọi quyết định thuế</text>

  <!-- Gold accent lines flanking city line -->
  <line x1="500" y1="500" x2="540" y2="500" stroke="#C9A961" stroke-width="2"/>
  <text x="600" y="510" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#486581">Hà Nội · Việt Nam</text>
  <line x1="660" y1="500" x2="700" y2="500" stroke="#C9A961" stroke-width="2"/>
</svg>
