<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="NHN&amp;D">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&amp;display=swap');
      .wm { font-family: Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -0.02em; text-anchor: middle; }
      .amp { font-family: 'Playfair Display', 'Times New Roman', serif; font-style: italic; font-weight: 400; }
      .navy { fill: #0F2B46; }
      .gold { fill: #C9A961; }
    </style>
  </defs>

  <!-- Rounded square cream background -->
  <rect x="0" y="0" width="100" height="100" rx="14" ry="14" fill="#FAF7F0" />

  <!-- NHN (Helvetica bold, navy, top) -->
  <text x="50" y="48" class="wm navy" font-size="28">NHN</text>

  <!-- &D (& Playfair italic gold, D Helvetica bold navy) -->
  <text x="50" y="78" font-size="28" text-anchor="middle" class="navy">
    <tspan class="amp gold">&amp;</tspan><tspan class="wm" dx="1">D</tspan>
  </text>
</svg>
